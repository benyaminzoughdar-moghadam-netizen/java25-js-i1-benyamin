<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Sten Sax Påse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sten Sax Påse</h1>

<div id="start">
    <input type="text" id="playerName" placeholder="Skriv ditt namn">
    <button id="startBtn">Starta spel</button>
</div>

<div id="game" class="hidden">
    <h2 id="welcome"></h2>

    <button data-choice="sten">Sten</button>
    <button data-choice="sax">Sax</button>
    <button data-choice="påse">Påse</button>

    <p id="result"></p>
    <p id="score"></p>
</div>

<script src="script.js"></script>
</body>
</html>
